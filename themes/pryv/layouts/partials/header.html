<header class="site-header">
  <div class="container header-inner">
    <div class="logo-area">
      <a href="{{ .Site.BaseURL }}">
        <img src="{{ "img/Logo-Pryv@3x.svg" | relURL }}" alt="{{ .Site.Title }}">
      </a>
      <span class="tagline">Data &amp; Privacy, <span class="red">Managed.</span></span>
    </div>
    <button class="nav-toggle" aria-label="Menu">&#9776;</button>
    <nav class="main-nav">
      <ul>
        {{ range .Site.Menus.main }}
          {{ if .HasChildren }}
            <li class="has-children">
              <a href="{{ .URL }}">{{ .Name }}</a>
              <ul class="sub-menu">
                {{ range .Children }}
                  <li><a href="{{ .URL }}">{{ .Name }}</a></li>
                {{ end }}
              </ul>
            </li>
          {{ else if not .Parent }}
            <li><a href="{{ .URL }}">{{ .Name }}</a></li>
          {{ end }}
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
