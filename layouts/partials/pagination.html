{{ $pag := .Paginator }}
{{ if gt $pag.TotalPages 1 }}
<nav class="pagination">
  {{ if $pag.HasPrev }}
    <a href="{{ $pag.First.URL }}">&laquo;</a>
    <a href="{{ $pag.Prev.URL }}">&lsaquo;</a>
  {{ end }}
  {{ range $pag.Pagers }}
    {{ if eq . $pag }}
      <span class="current">{{ .PageNumber }}</span>
    {{ else }}
      <a href="{{ .URL }}">{{ .PageNumber }}</a>
    {{ end }}
  {{ end }}
  {{ if $pag.HasNext }}
    <a href="{{ $pag.Next.URL }}">&rsaquo;</a>
    <a href="{{ $pag.Last.URL }}">&raquo;</a>
  {{ end }}
</nav>
{{ end }}
